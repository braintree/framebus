name: "Unit Tests"

on:
  push:
    branches:
      - "main"
  workflow_dispatch:
  workflow_call:
  pull_request:
    branches:
      - "*"

jobs:
  build:
    name: "Unit Tests"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@ee0669bd1cc54295c223e0bb666b733df41de1c5  # v2
      - name: Use Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version-file: .nvmrc
      - run: npm install
      - run: npm run lint
      - run: npm run test:unit
