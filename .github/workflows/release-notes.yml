# This workflow will create a release for the most recent deploy

name: Create release
run-name: Running github release
on:
  workflow_dispatch:
  workflow_call:

jobs:
  create_release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version-file: .nvmrc

      - name: Get version
        run: echo "latest_version=$(npm pkg get version --workspaces=false | tr -d \")" >> $GITHUB_ENV

      - name: Get details
        run: |
          {
            echo 'release_details<<EOF'
            awk '/^## / { if (p) exit; p=1 } p' CHANGELOG.md | sed '1d'
            echo EOF
          } >> $GITHUB_ENV

      - name: Create Release
        id: create_release
        uses: actions/create-release@0cb9c9b65d5d1901c1f53e5e66eaf4afd303e70e  # v1 (deprecated; migrate off)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # This token is provided by Actions, you do not need to create your own token
        with:
          tag_name: ${{ env.latest_version }}
          release_name: v${{ env.latest_version }}
          body: "${{ env.release_details }}"
          draft: false
          prerelease: false
